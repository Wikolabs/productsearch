name: Deploy ProductSearch

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VM via SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.WIKOLABS_VM_SSH_KEY }}
          VM_HOST: ${{ secrets.WIKOLABS_VM_HOST }}
          VM_USER: ${{ secrets.WIKOLABS_VM_USER }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$VM_HOST" >> ~/.ssh/known_hosts 2>/dev/null

          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no "$VM_USER@$VM_HOST" \
            "APP_DIR=/opt/productsearch
            GOOGLE_API_KEY='$GOOGLE_API_KEY'
            GROQ_API_KEY='$GROQ_API_KEY'

            set -e

            if [ ! -d \"\$APP_DIR/.git\" ]; then
              git clone https://github.com/Wikolabs/productsearch.git \$APP_DIR
            fi

            cd \$APP_DIR
            git pull origin main

            mkdir -p backend
            cat > backend/.env << EOF
GOOGLE_API_KEY=\$GOOGLE_API_KEY
GROQ_API_KEY=\$GROQ_API_KEY
TOP_K_RESULTS=5
EMBEDDING_MODEL=gemini-embedding-001
GROQ_MODEL=llama-3.3-70b-versatile
EOF

            docker compose down --remove-orphans 2>/dev/null || true
            docker compose up -d --build

            echo 'Deployed ProductSearch on http://\$VM_HOST:3032'"
