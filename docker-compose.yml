services:
  db:
    image: pgvector/pgvector:pg16
    container_name: productsearch-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: productsearch
      POSTGRES_USER: ps
      POSTGRES_PASSWORD: ps_pgvector_2024
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ps -d productsearch"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - productsearch

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: productsearch-backend
    restart: unless-stopped
    expose:
      - "8000"
    env_file:
      - ./backend/.env
    environment:
      - POSTGRES_URI=postgresql://ps:ps_pgvector_2024@db:5432/productsearch
    dns:
      - 8.8.8.8
      - 1.1.1.1
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 90s
    networks:
      - productsearch

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: productsearch-frontend
    restart: unless-stopped
    ports:
      - "3032:80"
    depends_on:
      backend:
        condition: service_started
    networks:
      - productsearch

networks:
  productsearch:
    driver: bridge

volumes:
  pg_data:
