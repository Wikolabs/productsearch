services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: productsearch-backend
    restart: unless-stopped
    expose:
      - "8000"
    env_file:
      - ./backend/.env
    dns:
      - 8.8.8.8
      - 1.1.1.1
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    networks:
      - productsearch

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: productsearch-frontend
    restart: unless-stopped
    ports:
      - "3032:80"
    depends_on:
      backend:
        condition: service_started
    networks:
      - productsearch

networks:
  productsearch:
    driver: bridge