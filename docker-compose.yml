services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: productsearch-backend
    restart: unless-stopped
    expose:
      - "8000"
    env_file:
      - ./backend/.env
    dns:
      - 8.8.8.8
      - 1.1.1.1
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    networks:
      - productsearch

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: productsearch-frontend
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - productsearch

  caddy:
    image: caddy:2-alpine
    container_name: productsearch-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
    networks:
      - productsearch

networks:
  productsearch:
    driver: bridge

volumes:
  caddy_data:
  caddy_config: